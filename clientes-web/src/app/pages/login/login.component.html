<div class="auth-page">
  <div class="auth-card">
    <div class="brand-strip"></div>

    <div class="auth-header">
      <span class="brand-badge">Banco Trading Cripto</span>
      <h1>Acessar conta</h1>
      <p>Entre com seu e-mail e senha para continuar.</p>
    </div>

    <form class="auth-form" (ngSubmit)="entrar()">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          id="email"
          [(ngModel)]="form.email"
          name="email"
          type="email"
          placeholder="seuemail@exemplo.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input
          id="senha"
          [(ngModel)]="form.senha"
          name="senha"
          type="password"
          placeholder="Digite sua senha"
          required
        />
      </div>

      <button class="primary-btn" type="submit">Entrar</button>
    </form>

    <p class="error-message" *ngIf="erro">{{ erro }}</p>

    <div class="auth-footer">
      <span>Ainda não tem conta?</span>
      <a routerLink="/clientes/novo">Cadastrar</a>
    </div>
  </div>
</div>
