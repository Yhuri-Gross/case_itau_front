<h2>{{ isAdmin ? 'Clientes' : 'Minha Conta' }}</h2>

<div style="margin-bottom: 16px;">
  <button mat-raised-button color="primary" *ngIf="!authService.isLoggedIn()" routerLink="/login">
    Login
  </button>

  <button mat-raised-button color="primary" *ngIf="isAdmin" routerLink="/clientes/novo">
    Novo Cliente
  </button>

  <button mat-raised-button color="warn" (click)="logout()">
    Sair
  </button>
</div>

<table mat-table [dataSource]="clientes">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let c">{{ c.id }}</td>
  </ng-container>

  <ng-container matColumnDef="nome">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let c">{{ c.nome }}</td>
  </ng-container>

  <ng-container matColumnDef="saldo">
    <th mat-header-cell *matHeaderCellDef>Saldo</th>
    <td mat-cell *matCellDef="let c">{{ c.saldo | currency:'BRL' }}</td>
  </ng-container>

  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef>Ações</th>
    <td mat-cell *matCellDef="let c">
      <button mat-button (click)="depositar(c.id)">Depositar</button>
      <button mat-button (click)="sacar(c.id)">Sacar</button>
      <button mat-button color="warn" (click)="deletar(c.id)">Excluir</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
